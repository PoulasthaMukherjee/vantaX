version: '3.8'

# Test environment - uses tmpfs for fast, ephemeral storage
services:
  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: vibe-postgres-test
    environment:
      POSTGRES_USER: vibe_test
      POSTGRES_PASSWORD: vibe_test
      POSTGRES_DB: vibe_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data  # Fast, ephemeral storage for tests
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibe_test -d vibe_test"]
      interval: 5s
      timeout: 3s
      retries: 3
    command: >
      postgres
      -c fsync=off
      -c synchronous_commit=off
      -c full_page_writes=off

  redis-test:
    image: redis:7-alpine
    container_name: vibe-redis-test
    ports:
      - "6380:6379"
    command: redis-server --appendonly no --save ""
