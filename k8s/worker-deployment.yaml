apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibe-worker
  labels:
    app: vibe
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vibe
      component: worker
  template:
    metadata:
      labels:
        app: vibe
        component: worker
    spec:
      containers:
        - name: worker
          image: gcr.io/PROJECT_ID/vibe-api:latest
          command: ["/bin/sh", "-c", "rq worker --url $REDIS_URL scoring"]
          envFrom:
            - secretRef:
                name: vibe-secrets
          env:
            - name: ENVIRONMENT
              value: "production"
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "python -c \"import os; import redis; r = redis.from_url(os.environ['REDIS_URL']); r.ping()\""
            initialDelaySeconds: 10
            periodSeconds: 30
