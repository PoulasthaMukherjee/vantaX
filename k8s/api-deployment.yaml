apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibe-api
  labels:
    app: vibe
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vibe
      component: api
  template:
    metadata:
      labels:
        app: vibe
        component: api
    spec:
      containers:
        - name: api
          image: gcr.io/PROJECT_ID/vibe-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: vibe-secrets
          env:
            - name: ENVIRONMENT
              value: "production"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vibe-api
  labels:
    app: vibe
    component: api
spec:
  selector:
    app: vibe
    component: api
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
