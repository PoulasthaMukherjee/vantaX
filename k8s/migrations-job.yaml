apiVersion: batch/v1
kind: Job
metadata:
  name: vibe-migrations
  labels:
    app: vibe
    component: migrations
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrations
          image: gcr.io/PROJECT_ID/vibe-api:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: vibe-secrets
          env:
            - name: ENVIRONMENT
              value: "production"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
