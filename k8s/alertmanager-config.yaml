apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: vibe
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      # Slack webhook URL (override via environment)
      slack_api_url: '${SLACK_WEBHOOK_URL}'

      # Default timings
      resolve_timeout: 5m

    # Alert routing tree
    route:
      # Default receiver
      receiver: 'slack-warnings'

      # Group alerts by service and alertname
      group_by: ['service', 'alertname']

      # Wait before sending first notification
      group_wait: 30s

      # Wait before sending updated notification
      group_interval: 5m

      # Wait before resending
      repeat_interval: 4h

      # Child routes for severity-based routing
      routes:
        # Critical alerts - immediate notification
        - match:
            severity: critical
          receiver: 'slack-critical'
          group_wait: 10s
          group_interval: 1m
          repeat_interval: 1h
          continue: false

        # Warnings - grouped notifications
        - match:
            severity: warning
          receiver: 'slack-warnings'
          group_wait: 1m
          group_interval: 10m
          repeat_interval: 4h

    # Inhibition rules - suppress lower severity when higher fires
    inhibit_rules:
      # If critical API down, suppress warning-level alerts
      - source_match:
          alertname: 'VibeAPIDown'
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['service']

      # If critical queue depth, suppress warning-level queue alerts
      - source_match:
          alertname: 'VibeQueueDepthCritical'
        target_match:
          alertname: 'VibeHighQueueDepth'
        equal: ['service']

      # If critical job latency, suppress warning
      - source_match:
          alertname: 'VibeJobLatencyCritical'
        target_match:
          alertname: 'VibeHighJobLatency'
        equal: ['service']

    # Receivers
    receivers:
      # Critical alerts channel
      - name: 'slack-critical'
        slack_configs:
          - channel: '#vibe-alerts-critical'
            send_resolved: true
            title: '{{ if eq .Status "firing" }}:rotating_light:{{ else }}:white_check_mark:{{ end }} {{ .CommonAnnotations.summary }}'
            text: |
              {{ range .Alerts }}
              *Alert:* {{ .Labels.alertname }}
              *Severity:* {{ .Labels.severity }}
              *Service:* {{ .Labels.service }}
              *Description:* {{ .Annotations.description }}
              {{ if .Annotations.runbook_url }}*Runbook:* {{ .Annotations.runbook_url }}{{ end }}
              {{ end }}
            color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
            actions:
              - type: button
                text: 'View in Grafana'
                url: '{{ (index .Alerts 0).GeneratorURL }}'
              - type: button
                text: 'Silence'
                url: '{{ template "__alertmanagerURL" . }}/#/silences/new?filter=%7Balertname%3D%22{{ .CommonLabels.alertname }}%22%7D'

      # Warning alerts channel
      - name: 'slack-warnings'
        slack_configs:
          - channel: '#vibe-alerts'
            send_resolved: true
            title: '{{ if eq .Status "firing" }}:warning:{{ else }}:white_check_mark:{{ end }} {{ .CommonAnnotations.summary }}'
            text: |
              {{ range .Alerts }}
              *Alert:* {{ .Labels.alertname }}
              *Service:* {{ .Labels.service }}
              *Description:* {{ .Annotations.description }}
              {{ end }}
            color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'

    # Templates (optional)
    templates:
      - '/etc/alertmanager/templates/*.tmpl'
